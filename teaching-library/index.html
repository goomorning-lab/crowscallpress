<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teaching Library — Crow's Call Press</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.hcaptcha.com https://newassets.hcaptcha.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://hcaptcha.com https://*.hcaptcha.com; connect-src 'self' https://crowscallpress-production.up.railway.app https://*.hcaptcha.com;">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="icon" type="image/png" href="../images/CCP-LOGO.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="css/teaching-library.css">
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body class="tl-body">

  <div class="tl-login-wrap">
    <div class="tl-login-card">

      <a href="/" class="tl-back-link">← Back to site</a>

      <div class="tl-logo-mark">✎</div>
      <h1 class="tl-login-heading">Crow's <em>Call</em> Press<br>Teaching Library</h1>
      <p class="tl-login-sub">For Crow's Call Press partner educators. Sign in to access your materials.</p>

      <form class="tl-form" id="tl-login-form" novalidate>
        <div class="tl-field">
          <label for="tl-email">Email</label>
          <input type="email" id="tl-email" name="email" placeholder="you@school.com" required autocomplete="email">
        </div>
        <div class="tl-field">
          <label for="tl-password">Password</label>
          <div class="tl-password-wrap">
            <input type="password" id="tl-password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="tl-show-pw" id="tl-show-pw" aria-label="Show password">
              <svg id="tl-eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="h-captcha" data-sitekey="ec4c9178-3844-46c0-9c78-2daa2714a236" style="margin-bottom:0.5rem"></div>
        <div class="tl-error" id="tl-error" role="alert" aria-live="polite"></div>
        <button type="submit" class="tl-btn-primary" id="tl-submit-btn">Sign In</button>
      </form>

      <p class="tl-login-footer">Not a partner yet? <a href="/contact/">Get in touch</a></p>

    </div>
  </div>

<script src="js/teaching-library.js"></script>
<script>
(function () {
  // If already logged in this session, go straight to dashboard
  if (sessionStorage.getItem('tl_token')) {
    window.location.href = 'dashboard.html';
    return;
  }

  // Show timeout message if redirected after inactivity
  if (new URLSearchParams(window.location.search).get('timeout')) {
    var err = document.getElementById('tl-error');
    err.textContent = 'You were signed out after 60 minutes of inactivity.';
  }

  // Show/hide password toggle
  document.getElementById('tl-show-pw').addEventListener('click', function () {
    var input = document.getElementById('tl-password');
    var isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    document.getElementById('tl-eye-icon').style.opacity = isHidden ? '0.4' : '1';
  });

  var form = document.getElementById('tl-login-form');
  var errorEl = document.getElementById('tl-error');
  var submitBtn = document.getElementById('tl-submit-btn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('tl-email').value.trim();
    var password = document.getElementById('tl-password').value;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorEl.textContent = 'Please enter a valid email address.';
      return;
    }
    if (password.length < 6 || password.length > 128) {
      errorEl.textContent = 'Password must be between 6 and 128 characters.';
      return;
    }
    var captchaToken = hcaptcha.getResponse();
    if (!captchaToken) {
      errorEl.textContent = 'Please complete the captcha.';
      return;
    }

    errorEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    fetch('https://crowscallpress-production.up.railway.app/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password, captchaToken: captchaToken })
    })
      .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
      .then(function (result) {
        if (result.ok && result.data.token) {
          sessionStorage.setItem('tl_token', result.data.token);
          if (result.data.name) sessionStorage.setItem('tl_name', result.data.name);
          window.location.href = 'dashboard.html';
        } else {
          hcaptcha.reset();
          errorEl.textContent = result.data.message || 'Incorrect email or password. Please try again.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      })
      .catch(function () {
        hcaptcha.reset();
        errorEl.textContent = 'Something went wrong. Please check your connection and try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      });
  });
})();
</script>
</body>
</html>
